name: Update Campus Jobs

on:
  schedule:
    - cron: "0 1 * * *"   # 每天北京时间 09:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Monitor recruitment sites
        run: python campus-jobs/scripts/monitor.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || (git commit -m "chore: update campus monitor" && git push)
